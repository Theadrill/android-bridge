<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Bridge</title>
    <!-- Silenciador do aviso do Tailwind -->
    <script>
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
    </script>
    <!-- Tailwind CSS para renderizar o layout estrutural do chat importado -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Symbols:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        .google-symbols {
            font-family: 'Google Symbols';
            font-weight: normal;
            font-style: normal;
            font-size: 20px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            vertical-align: middle;
        }

        /* Suporte caso a classe usada seja codicon (comum no VSCode) com texto interno */
        .codicon {
            font-family: 'Google Symbols', 'codicon', sans-serif;
        }

        :root {
            --bg: #0a0a0c;
            --card: #16161a;
            --primary: #3b82f6;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: #2d2d33;
            
            /* Variáveis falsificadas do VS Code para enganar o DOM do Antigravity */
            --vscode-editor-background: #0a0a0c;
            --vscode-editor-foreground: #ffffff;
            --vscode-button-background: #3b82f6;
            --vscode-button-foreground: #ffffff;
            --vscode-badge-background: #3b82f6;
            --ide-chat-background: #16161a;
            --vscode-commandCenter-background: #16161a;
        }

        /* Animação para o estado Thinking/Generating do Antigravity */
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .thinking, .generating, [class*="thinking"], [class*="generating"] {
            animation: pulse-opacity 1.5s infinite ease-in-out;
        }

        /* Garantir que blocos de código e elementos do VS Code herdem cores corretas */
        pre, code {
            background-color: #1e1e1e !important;
            border-radius: 4px;
        }
        
        .monaco-editor, .monaco-workbench {
            --vscode-editor-background: #0a0a0c;
            --vscode-editor-foreground: #ffffff;
        }

        /* Ajuste para ícones codicon que vem do VS Code */
        .codicon {
            display: inline-block;
            vertical-align: middle;
        }

        /* Tornar fundos do Tailwind sólidos sem mudar a cor ou formato */
        :root {
            --tw-bg-opacity: 1 !important;
            --tw-text-opacity: 1 !important;
            --tw-border-opacity: 1 !important;
        }

        /* Forçar opacidade em elementos de chat específicos do Antigravity */
        [class*="bg-"][class*="/"], [class*="bg-gray-500"] {
            --tw-bg-opacity: 1 !important;
            background-color: rgb(30, 30, 36) !important; /* Cor sólida base */
        }

        /* Corrigir sobreposição e bloquear min-height de blocos injetados */
        #realtime-html-receiver * {
            min-height: 0 !important;
        }

        /* Preservar arredondamento original */
        .rounded-xl, .rounded-2xl, .rounded-3xl {
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0; /* Removido padding global */
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        #status {
            font-size: 9px;
            color: #555;
            margin-bottom: 2px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        .connected {
            color: #10b981 !important;
        }

        .disconnected {
            color: #ef4444 !important;
        }

        .header {
            margin-bottom: 8px;
        }

        h2 {
            color: var(--primary);
            margin: 0;
            font-size: 16px;
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        #history-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        header {
            background: var(--bg);
            padding: 15px 20px; /* Padding ajustado */
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0; /* Garante que o header não encolha */
        }

        /* Classe única para modo compacto */
        body.compact-mode header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px;
            margin-bottom: 0;
        }

        body.compact-mode header h1 {
            font-size: 13px;
            margin: 0;
        }

        body.compact-mode header .status-badge {
            margin: 0;
            font-size: 9px;
        }

        body.compact-mode header #header-footer {
            display: none !important;
        }

        /* Media query apenas como fallback, sem conflito com a classe */
        @media (max-height: 500px) {
            header:not(.compact-mode-active) {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 12px;
                margin-bottom: 0;
            }

            header h1 {
                font-size: 13px;
                margin: 0;
            }

            header .status-badge {
                margin: 0;
                font-size: 9px;
            }

            header #header-footer {
                display: none !important;
            }
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .history-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-out;
        }

        .bubble {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .bubble.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .bubble.assistant {
            align-self: flex-start;
            background: #2d2d33;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
            border: 1px solid #3d3d45;
        }

        .copy-bubble-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 4px 10px;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .copy-bubble-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary);
        }

        .copy-bubble-btn:active {
            transform: scale(0.95);
        }

        .history-meta {
            font-size: 9px;
            color: var(--text-dim);
            margin: 0 6px 4px 6px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .assistant-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Cascadia Code', monospace;
            font-size: 11px;
            color: #fca5a5;
        }

        .assistant-content pre {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #333;
            margin: 8px 0;
        }

        .copy-btn,
        .action-btn {
            background: #2d2d33;
            border: none;
            border-radius: 5px;
            padding: 5px;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            min-width: 30px;
            height: 30px;
        }

        .copy-btn:active {
            background: #3b82f633;
            transform: scale(0.95);
        }

        .input-area {
            background: var(--card);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            flex-shrink: 0; /* Garante que a área de input não encolha */
        }

        textarea {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .button-dock {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
            padding: 0;
        }

        .dock-scroll-container {
            flex: 1;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dock-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .dock-btn {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            background: #2d2d33;
            border: 1px solid #3d3d45;
            border-radius: 10px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .dock-btn.fixed-left {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
        }

        .dock-btn.fixed-right {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .dock-btn:active {
            transform: scale(0.92);
            background: #444;
        }

        .send-btn-dock {
            background: var(--primary) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .send-btn-dock:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }

        #streaming-box {
            font-size: 10px;
            color: #6366f1;
            background: #6366f111;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            text-align: left;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            white-space: pre-wrap;
            max-height: 30px;
            overflow: hidden;
            border: 1px solid #6366f122;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            width: 95%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: modalScale 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .modal.full-width {
            width: 100%;
            max-width: none;
            border-radius: 0;
            border-left: none;
            border-right: none;
        }

        #modal-content {
            overflow-y: auto;
            padding-right: 5px;
        }

        #modal-content::-webkit-scrollbar {
            width: 4px;
        }

        #modal-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .scroll-area::-webkit-scrollbar {
            display: none;
        }

        .scroll-area {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        @keyframes modalScale {
            from {
                transform: scale(0.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: var(--primary);
            flex-shrink: 0;
        }

        .modal-btn {
            width: 100%;
            min-height: 50px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #2d2d33;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .modal-btn.window-item {
            font-size: 12px;
            justify-content: flex-start;
            padding: 0 15px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            line-height: 50px;
        }

        .modal-btn:active {
            transform: scale(0.96);
            background: #3d3d45;
        }

        .modal-btn.cancel {
            border: none;
            background: transparent;
            color: var(--text-dim);
            margin-top: 5px;
            flex-shrink: 0;
        }

        .landscape-only {
            display: none !important;
        }

        .portrait-only {
            display: flex !important;
        }

        /* Modo Landscape / Telas pequenas em altura */
        @media (orientation: landscape) or (max-height: 450px) {
            .landscape-only {
                display: flex !important;
            }

            .portrait-only {
                display: none !important;
            }

            #modal-content.touchpad-active {
                flex-direction: row !important;
                gap: 12px !important;
                align-items: stretch !important;
            }

            .touchpad-side-controls {
                width: 140px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                flex-shrink: 0;
            }

            .touchpad-side-controls .mouse-btns {
                flex-direction: column !important;
                flex: 1;
                justify-content: center;
                gap: 8px !important;
            }

            .touchpad-side-controls .mouse-btns .modal-btn {
                flex: none !important;
                height: 45px !important;
                min-height: 45px !important;
                padding: 0 !important;
            }

            #touch-area {
                margin-bottom: 0 !important;
            }

            .modal.full-width {
                height: 98vh !important;
            }
        }

        /* Overlay de Sensibilidade */
        #sens-settings-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 10, 0.98);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 20px;
            animation: fadeIn 0.2s ease-out;
        }

        /* Fullscreen Fix */
        :fullscreen .modal.full-width {
            width: 100vw !important;
            height: 100vh !important;
            max-height: 100vh !important;
            border: none !important;
            border-radius: 0 !important;
        }

        :fullscreen .modal-overlay {
            padding: 0 !important;
        }

        .send-btn {
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        .send-btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        /* Estilos para o conteúdo formatado do Streaming - Versão Compacta */
        #streaming-content b,
        #streaming-content strong {
            color: #fff;
            font-weight: 800;
        }

        #streaming-content ul,
        #streaming-content ol {
            margin: 2px 0;
            padding-left: 18px;
            width: 100%;
        }

        #streaming-content li {
            margin-bottom: 2px;
            display: list-item !important;
        }

        #streaming-content p {
            margin-bottom: 4px;
        }

        /* Remove espaço extra se houver parágrafos dentro da lista */
        #streaming-content li p {
            margin-bottom: 0;
            display: inline;
        }

        #streaming-content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
            color: #fca5a5;
        }
    </style>
</head>

<body>
    <!-- Restart Modal -->
    <div id="restart-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="modal-title">OTHER ACTIONS</h3>
            <div id="modal-content">
                <button class="modal-btn"
                    onclick="ws.send(JSON.stringify({ type: 'MESSAGE', msg: 'faÃ§a o commit e Sync' })); closeModal();"
                    style="color: #10b981;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                        <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path>
                        <line x1="12" y1="2" x2="12" y2="8"></line>
                        <line x1="12" y1="16" x2="12" y2="22"></line>
                    </svg>
                    Commit e Sync
                </button>
                <button class="modal-btn" onclick="execRestart('RESTART_EXT')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                    Restart Extension
                </button>
                <button class="modal-btn" onclick="execRestart('REFRESH_F5')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Refresh (F5)
                </button>
                <button class="modal-btn" onclick="execRestart('RESTART_PROJECT')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"></polyline>
                        <line x1="12" y1="19" x2="20" y2="19"></line>
                    </svg>
                    Restart Project (npm)
                </button>
                <button class="modal-btn" onclick="getWindows()" style="color: #60a5fa;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Alt Tab
                </button>
                <button class="modal-btn" onclick="openFreeWriting()" style="color: #c084fc;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                        <path d="M6 8h.01"></path>
                        <path d="M10 8h.01"></path>
                        <path d="M14 8h.01"></path>
                        <path d="M18 8h.01"></path>
                        <path d="M6 12h.01"></path>
                        <path d="M10 12h.01"></path>
                        <path d="M14 12h.01"></path>
                        <path d="M18 12h.01"></path>
                        <path d="M6 16h.01"></path>
                        <path d="M10 16h.01"></path>
                        <path d="M14 16h.01"></path>
                        <path d="M18 16h.01"></path>
                    </svg>
                    Escrever Livremente
                </button>
            </div>
            <button id="main-cancel-btn" class="modal-btn cancel" onclick="closeModal()"
                style="margin-bottom: 0;">CANCELAR</button>
        </div>
    </div>

    <header>
        <h1>ANTIGRAVITY BRIDGE</h1>
        <div class="status-badge" id="status">
            <div class="status-dot"></div>
            <span id="status-text">DESCONECTADO</span>
        </div>
        <div id="header-footer" style="height: 10px;"></div>
    </header>

    <div class="scroll-area" id="main-scroll">
        <!-- ÁREA DO CHAT EM TEMPO REAL -->
        <div id="live-chat-container"
            style="display: flex; flex-direction: column; align-items: stretch; gap: 15px; padding: 20px; padding-bottom: 50px;">
            
            <div id="realtime-html-receiver" style="width: 100%;">
                <div style="text-align: center; opacity: 0.3; margin-top: 50px;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div style="font-size: 14px; letter-spacing: 2px;">Aguardando nova interação...</div>
                </div>
            </div>

            <button id="capture-dom-btn" class="modal-btn" onclick="ws.send(JSON.stringify({ type: 'CAPTURE_DOM' }))"
                style="margin-top: 20px; background: #3498db; color: white; display: none;">
                📸 CAPTURAR CHAT ATUAL
            </button>
            
            <!-- IDs mantidos para não quebrar scripts passados, mas ocultos -->
            <div id="prompt-text" style="display: none;"></div>
            <div id="streaming-content" style="display: none;"></div>
        </div>
    </div>

    <div class="input-area">
        <textarea id="msg" placeholder="Dite algo..." onkeydown="checkEnter(event)" autocomplete="on" autocorrect="on"
            autocapitalize="sentences" spellcheck="true" inputmode="text"></textarea>

        <div class="button-dock">
            <!-- FIXO ESQUERDA -->
            <button class="dock-btn fixed-left" onclick="openModal()" title="Outras Ações">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                </svg>
            </button>

            <!-- ESTEIRA ROLÁVEL -->
            <div class="dock-scroll-container">
                <button class="dock-btn" onclick="console.log('chat btn clicked'); openChatSelector();"
                    title="Escolher Chat" style="color: #f472b6;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
                <button class="dock-btn" onclick="console.log('model btn clicked'); openModelSelector();"
                    title="Selecionar Modelo" style="color: #a78bfa;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="10" r="3"></circle>
                        <path d="M12 6v1"></path>
                        <path d="M9 13h6"></path>
                    </svg>
                </button>
                <button class="dock-btn" onclick="openTouchpad()" title="Touchpad Mode" style="color: #a78bfa;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="7" ry="7"></rect>
                        <path d="M12 6v4"></path>
                    </svg>
                </button>
                <button class="dock-btn" onclick="sendAction('COPY')" title="Copiar" style="color: #94a3b8;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <button class="dock-btn" onclick="sendAction('PASTE')" title="Colar" style="color: #60a5fa;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                </button>
                <button class="dock-btn" onclick="sendAction('ENTER')" title="Enter / Pular Linha"
                    style="color: #10b981;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 10 4 15 9 20"></polyline>
                        <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                    </svg>
                </button>
                <button class="dock-btn" onclick="sendAction('BACKSPACE')" title="Backspace">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                        <line x1="18" y1="9" x2="12" y2="15"></line>
                        <line x1="12" y1="9" x2="18" y2="15"></line>
                    </svg>
                </button>
                <button class="dock-btn" onclick="sendAction('SAVE')" title="Salvar (Ctrl+S)" style="color: #ef4444;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                </button>
            </div>

            <!-- FIXO DIREITA -->
            <button class="dock-btn fixed-right" onclick="handleSendClick()" id="send-btn"
                style="transition: all 0.3s ease;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round" id="send-icon">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let ws;
        let isReconnected = false;
        let sensitivity = localStorage.getItem('sensitivity') ? parseFloat(localStorage.getItem('sensitivity')) : 1.5;
        let activeModifiers = { CTRL: false, ALT: false, SHIFT: false, WIN: false };

        function toggleModifier(mod) {
            activeModifiers[mod] = !activeModifiers[mod];
            window.navigator.vibrate && window.navigator.vibrate(10);
            // Se estiver no modal de funções, re-renderiza para mostrar o estado ativo
            const title = document.getElementById('modal-title');
            if (title && title.innerText === 'TECLADO DE FUNÇÃO') {
                openFunctionKeys();
            }
        }

        function initKeyboardDetection() {
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => {
                    const vh = window.visualViewport.height;
                    const fullH = window.innerHeight;

                    // Garante que o body tenha exatamente a altura visível
                    document.body.style.height = vh + 'px';

                    // Força o window a ficar no topo (bloqueia o salto do navegador)
                    window.scrollTo(0, 0);

                    const isKeyboardVisible = vh < fullH * 0.85;
                    const isLandscape = vh < 500;

                    if (isKeyboardVisible || isLandscape) {
                        document.body.classList.add('compact-mode');
                    } else {
                        document.body.classList.remove('compact-mode');
                    }

                    setTimeout(scrollToBottom, 100);
                });
            }

            // Trava de scroll adicional para navegadores teimosos
            window.addEventListener('scroll', () => {
                if (document.activeElement.tagName === 'TEXTAREA') {
                    window.scrollTo(0, 0);
                }
            }, { passive: false });
        }
        initKeyboardDetection();
        let lastCapturedResponse = "";
        let isWaitingForNewResponse = false;

        function updateSendButton() {
            const btn = document.getElementById('send-btn');
            const icon = document.getElementById('send-icon');
            if (!btn || !icon) return;

            if (isWaitingForNewResponse) {
                btn.style.color = '#ef4444'; // Vermelho para Stop
                icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="1" ry="1"></rect>';
            } else {
                btn.style.color = ''; // Cor padrão (verde/primária)
                icon.innerHTML = '<line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>';
            }
        }

        function connect() {
            const status = document.getElementById('status');
            ws = new WebSocket('ws://' + window.location.host);

            ws.onopen = () => {
                status.innerText = '● CONECTADO';
                status.className = 'connected';
                ws.send(JSON.stringify({ type: 'HELLO', reconnected: isReconnected }));
                isReconnected = false;
            };

            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);

                if (d.type === 'UPDATE') {
                    // Update simples mantido por segurança
                    const s = document.getElementById('streaming-box');
                    if (s) s.innerText = d.payload;
                }

            // Nova lida do chat em tempo real exportado pelo Antigravity
            if (d.type === 'STREAMING_CHAT') {
                const receiver = document.getElementById('realtime-html-receiver');
                if (receiver) {
                    receiver.innerHTML = d.payload;
                    setTimeout(scrollToBottom, 50);
                }
            }

            if (d.type === 'STREAMING_STATUS') {
                if (d.payload === 'GENERATING') {
                    isWaitingForNewResponse = true;
                } else {
                    isWaitingForNewResponse = false;
                }
                updateSendButton();
            }

            if (d.type === 'COMMAND' && d.action === 'REFRESH') {
                window.location.reload();
            }

                if (d.type === 'WINDOWS_LIST') {
                    renderWindowList(d.payload);
                }

                if (d.type === 'TARGETS') {
                    handleTargets(d);
                }

                if (d.type === 'MODELS') {
                    handleModels(d);
                }
            };

            ws.onclose = () => {
                status.innerText = '○ DESCONECTADO - RECONECTANDO...';
                status.className = 'disconnected';
                isReconnected = true;
                setTimeout(connect, 2000);
            };

            ws.onerror = () => { ws.close(); };
        }

        // Funções antigas de histórico foram removidas.

        function checkEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        function handleSendClick() {
            send();
        }

        function stopGeneration() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'STOP_GENERATION' }));
                window.navigator.vibrate && window.navigator.vibrate([30, 50, 30]);
            }
        }

        function send() {
            const m = document.getElementById('msg');
            const val = m.value.trim();
            if (val && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'MESSAGE', msg: val }));
                m.value = '';
                window.navigator.vibrate && window.navigator.vibrate(20);
                m.focus();
                scrollToBottom(true);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Erro ao entrar em fullscreen:', err);
                });
            } else {
                document.exitFullscreen();
            }
            closeModal();
        }

        function sendAction(action) {
            if (ws.readyState === WebSocket.OPEN) {
                const mods = Object.keys(activeModifiers).filter(k => activeModifiers[k]);
                ws.send(JSON.stringify({ type: 'KEY_SIM', action: action, modifiers: mods }));

                // Limpa modificadores após o uso (comportamento sticky)
                if (mods.length > 0) {
                    activeModifiers = { CTRL: false, ALT: false, SHIFT: false, WIN: false };
                    const title = document.getElementById('modal-title');
                    if (title && (title.innerText === 'TECLADO DE FUNÇÃO' || title.innerText === 'ESCREVER LIVREMENTE')) {
                        // Pequeno delay para o usuário ver o estado ativo antes de limpar (opcional)
                        setTimeout(openFunctionKeys, 100);
                    }
                }

                window.navigator.vibrate && window.navigator.vibrate(10);
            }
        }

        function openModal() {
            const modalDiv = document.querySelector('.modal');
            modalDiv.classList.remove('full-width');
            modalDiv.style.height = '';
            modalDiv.style.maxHeight = '80vh';
            modalDiv.style.padding = '24px';
            modalDiv.style.marginTop = '';

            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            content.style.display = 'block';
            content.style.height = 'auto';

            title.innerText = 'OTHER ACTIONS';
            content.innerHTML = `
                    <button class="modal-btn" onclick="ws.send(JSON.stringify({ type: 'MESSAGE', msg: 'faça o commit e Sync' })); closeModal();" style="color: #10b981;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path><line x1="12" y1="2" x2="12" y2="8"></line><line x1="12" y1="16" x2="12" y2="22"></line></svg>
                        Commit e Sync
                    </button>
                    <button class="modal-btn" onclick="execRestart('RESTART_EXT')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                        Restart Extension
                    </button>
                    <button class="modal-btn" onclick="execRestart('REFRESH_F5')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        Refresh (F5)
                    </button>
                    <button class="modal-btn" onclick="execRestart('RESTART_PROJECT')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        Restart Project (npm)
                    </button>
                    <button class="modal-btn" onclick="getWindows()" style="color: #60a5fa;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Alt Tab
                    </button>
                    <button class="modal-btn" onclick="openChatSelector()" style="color: #f472b6;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        Escolher Chat
                    </button>
                    <button class="modal-btn" onclick="openFreeWriting()" style="color: #c084fc;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M6 8h.01"></path><path d="M10 8h.01"></path><path d="M14 8h.01"></path><path d="M18 8h.01"></path><path d="M6 12h.01"></path><path d="M10 12h.01"></path><path d="M14 12h.01"></path><path d="M18 12h.01"></path><path d="M6 16h.01"></path><path d="M10 16h.01"></path><path d="M14 16h.01"></path><path d="M18 16h.01"></path></svg>
                        Escrever Livremente
                    </button>
                    <button class="modal-btn" onclick="document.getElementById('print-input').click()" style="color: #3b82f6;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        Enviar Print (Galeria)
                    </button>
                    <button class="modal-btn" onclick="openFunctionKeys()" style="color: #fca5a5;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M6 8h.01"></path><path d="M10 8h.01"></path><path d="M14 8h.01"></path><path d="M18 8h.01"></path><path d="M6 12h.01"></path><path d="M10 12h.01"></path><path d="M14 12h.01"></path><path d="M18 12h.01"></path><path d="M6 16h.01"></path><path d="M10 16h.01"></path><path d="M14 16h.01"></path><path d="M18 16h.01"></path></svg>
                        Teclado de Função
                    </button>
                    <button class="modal-btn" onclick="openMediaKeys()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        Botões de Mídia
                    </button>
                    <button class="modal-btn" onclick="toggleFullscreen()" style="color: #fbbf24;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                        Fullscreen
                    </button>
                `;
            document.getElementById('restart-modal').style.display = 'flex';
            window.navigator.vibrate && window.navigator.vibrate(20);
        }

        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            const restartModal = document.getElementById('restart-modal');
            if (restartModal) restartModal.style.display = 'none';

            const mainCancel = document.getElementById('main-cancel-btn');
            if (mainCancel) mainCancel.style.display = 'block';

            const modal = document.querySelector('.modal');
            if (modal) {
                modal.classList.remove('full-width');
                modal.style.height = '';
                modal.style.maxHeight = '80vh';
                modal.style.padding = '24px';
            }

            const title = document.getElementById('modal-title');
            if (title) title.style.display = 'block';

            const content = document.getElementById('modal-content');
            if (content) {
                content.classList.remove('touchpad-active');
                content.style.display = 'block';
                content.style.height = 'auto';
            }

            // Reset de modificadores ao fechar
            activeModifiers = { CTRL: false, ALT: false, SHIFT: false, WIN: false };
        }

        function openAltTab() {
            openModal();
            getWindows();
        }

        function getWindows() {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'KEY_SIM', action: 'GET_WINDOWS' }));
                document.getElementById('modal-title').innerText = 'BUSCANDO JANELAS...';
            }
        }

        function renderWindowList(windows) {
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            title.innerText = 'ALT TAB';
            content.innerHTML = '';

            if (windows.length === 0) {
                content.innerHTML = '<div style="color: #666; padding: 20px;">Nenhuma janela encontrada</div>';
            } else {
                windows.forEach(w => {
                    const btn = document.createElement('button');
                    btn.className = 'modal-btn window-item';
                    btn.innerText = w.title;
                    btn.onclick = () => switchWindow(w.id, w.title);
                    content.appendChild(btn);
                });
            }

            // Botão de Voltar
            const backBtn = document.createElement('button');
            backBtn.className = 'modal-btn';
            backBtn.style.marginTop = '10px';
            backBtn.style.background = 'transparent';
            backBtn.style.borderColor = '#444';
            backBtn.innerHTML = '← Voltar';
            backBtn.onclick = openModal;
            content.appendChild(backBtn);
        }

        function switchWindow(id, title) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'KEY_SIM', action: 'SWITCH_WINDOW', windowId: id, title: title }));
                // Ao invés de fechar, volta para o menu principal de ações
                openModal();
            }
        }

        function openChatSelector() {
            console.log('openChatSelector called');
            ws.send(JSON.stringify({ type: 'GET_TARGETS' }));
            const modal = document.getElementById('restart-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            title.innerText = 'ESCOLHER CHAT';
            content.innerHTML = `<div style="text-align: center; color: #9ca3af; padding: 20px;">Carregando chats...</div>`;
            modal.style.display = 'flex';
            window.navigator.vibrate && window.navigator.vibrate(20);
        }

        function handleTargets(data) {
            console.log('handleTargets', data);
            const modal = document.getElementById('restart-modal');
            const content = document.getElementById('modal-content');
            console.log('modal:', modal, 'content:', content);
            if (!data.targets || data.targets.length === 0) {
                content.innerHTML = `<div style="text-align: center; color: #ef4444; padding: 20px;">Nenhum chat encontrado</div>`;
                return;
            }
            let html = `<div style="display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto;">`;
            data.targets.forEach((t, i) => {
                const selected = i === data.selectedIndex ? 'background: rgba(59, 130, 246, 0.3); border-color: #3b82f6;' : '';
                html += `<button class="modal-btn" onclick="selectTarget(${i})" style="${selected} text-align: left; justify-content: flex-start;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f472b6" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        ${t.title || 'Chat ' + (i + 1)}
                    </button>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            modal.style.display = 'flex';
        }

        function selectTarget(index) {
            ws.send(JSON.stringify({ type: 'SELECT_TARGET', index }));
            closeModal();
            window.navigator.vibrate && window.navigator.vibrate(50);
        }

        function openModelSelector() {
            console.log('openModelSelector called');
            ws.send(JSON.stringify({ type: 'GET_MODELS' }));
            const modal = document.getElementById('restart-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            title.innerText = 'SELECIONAR MODELO';
            content.innerHTML = `<div style="text-align: center; color: #9ca3af; padding: 20px;">Carregando modelos...</div>`;
            modal.style.display = 'flex';
            window.navigator.vibrate && window.navigator.vibrate(20);
        }

        function handleModels(data) {
            const modal = document.getElementById('restart-modal');
            const content = document.getElementById('modal-content');
            window.availableModels = data.models; // Store for selection

            if (!data.models || data.models.length === 0) {
                content.innerHTML = `<div style="text-align: center; color: #ef4444; padding: 20px;">Nenhum modelo encontrado</div>`;
                return;
            }
            let html = `<div style="display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto;">`;
            data.models.forEach((m, i) => {
                const selected = i === data.selectedIndex ? 'background: rgba(167, 139, 250, 0.3); border-color: #a78bfa;' : '';
                html += `<button class="modal-btn" onclick="selectModel(${i})" style="${selected} text-align: left; justify-content: flex-start;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>
                        ${m}
                    </button>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            modal.style.display = 'flex';
        }

        function selectModel(index) {
            const modelName = window.availableModels[index];
            ws.send(JSON.stringify({ type: 'SELECT_MODEL', index, modelName }));

            closeModal();
            window.navigator.vibrate && window.navigator.vibrate(50);

                m.value = '';
                window.navigator.vibrate && window.navigator.vibrate(20);
            }
        }

        function checkFreeEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendFreeText();

        }

        function insertNewLine() {
            const m = document.getElementById('free-msg');
            const start = m.selectionStart;
            const end = m.selectionEnd;
            const top = m.scrollTop;
            m.value = m.value.substring(0, start) + "\n" + m.value.substring(end);
            m.selectionStart = m.selectionEnd = start + 1;
            m.scrollTop = top;
            m.focus();
        }

        function updateCustomScrollbar(el) {
            const thumb = document.getElementById('custom-thumb');
            if (!thumb) return;

            const scrollHeight = el.scrollHeight;
            const clientHeight = el.clientHeight;

            if (scrollHeight <= clientHeight) {
                thumb.style.display = 'none';
                return;
            } else {
                thumb.style.display = 'block';
            }

            const thumbHeight = Math.max((clientHeight / scrollHeight) * clientHeight, 20);
            thumb.style.height = `${thumbHeight}px`;

            const scrollRatio = el.scrollTop / (scrollHeight - clientHeight);
            const maxThumbTop = clientHeight - thumbHeight;
            const thumbTop = scrollRatio * maxThumbTop;

            thumb.style.top = `${thumbTop}px`;
        }

        function setupTouchpad() {
            const pad = document.getElementById('touch-area');
            if (!pad) return;
            let lastX = 0, lastY = 0;
            let lastScrollY = 0;

            let touchStartTime = 0;
            let isMoved = false;
            let longPressTimer = null;

            pad.oncontextmenu = (e) => { e.preventDefault(); return false; };

            pad.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isMoved = false;
                touchStartTime = Date.now();

                if (e.touches.length === 1) {
                    lastX = e.touches[0].clientX;
                    lastY = e.touches[0].clientY;

                    longPressTimer = setTimeout(() => {
                        if (!isMoved) {
                            sendMouseClick('RIGHT');
                            window.navigator.vibrate && window.navigator.vibrate([30, 30]);
                            longPressTimer = null;
                            touchStartTime = 0; // Impede clique esquerdo no end
                        }
                    }, 600);
                } else if (e.touches.length === 2) {
                    lastScrollY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    if (longPressTimer) clearTimeout(longPressTimer);
                }
            }, { passive: false });

            pad.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touchengt) {
                    const curX = e.touches[0].clientX;
                    const curY = e.touches[0].clientY;
                    const dx = curX - lastX;
                    const dy = curY - lastY;

                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                        isMoved = true;
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                        }
                    }

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'MOUSE_SIM', action: 'MOVE', dx: dx * sensitivity, dy: dy * sensitivity }));
                    }

                    lastX = curX;
                    lastY = curY;
                } else if (e.touches.length === 2) {
                    isMoved = true;
                    const curScrollY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    const dy = curScrollY - lastScrollY;
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'MOUSE_SIM', action: 'SCROLL', dy: dy * -(sensitivity + 0.5) }));
                    }
                    lastScrollY = curScrollY;
                }
            }, { passive: false });

            pad.addEventListener('touchend', (e) => {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }

                if (!isMoved && touchStartTime > 0) {
                    const duration = Date.now() - touchStartTime;
                    if (duration < 300) {
                        sendMouseClick('LEFT');
                    }
                }
            });
        }

        function sendMouseClick(btn) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'MOUSE_SIM', action: 'CLICK', button: btn }));
                window.navigator.vibrate && window.navigator.vibrate(15);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Erro ao entrar em fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function toggleSensOverlay() {
            const overlay = document.getElementById('sens-settings-overlay');
            if (!overlay) return;
            const isVisible = overlay.style.display === 'flex';
            overlay.style.display = isVisible ? 'none' : 'flex';
        }

        async function uploadPrint(input) {
            if (!input.files || !input.files[0]) return;

            const file = input.files[0];
            const formData = new FormData();
            formData.append('image', file);

            const statusText = document.getElementById('status-text');
            const oldStatus = statusText ? statusText.innerText : '';
            if (statusText) statusText.innerText = 'ENVIANDO PRINT...';

            try {
                const response = await fetch('/upload-print', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    if (statusText) statusText.innerText = '✅ PRINT ANEXADO!';
                    window.navigator.vibrate && window.navigator.vibrate([30, 30]);
                    closeModal();
                } else {
                    if (statusText) statusText.innerText = '❌ ERRO NO UPLOAD';
                }
            } catch (err) {
                if (statusText) statusText.innerText = '❌ FALHA NA CONEXÃO';
                console.error(err);
            }

            setTimeout(() => {
                if (statusText) statusText.innerText = oldStatus;
                input.value = ''; // Reseta o input
            }, 2000);
        }

        connect();
    </script>
    <input type="file" id="print-input" accept="image/*" style="display:none" onchange="uploadPrint(this)">
</body>
