    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>IA Bridge</title>
        <style>
            :root {
                --bg: #0a0a0c;
                --card: #16161a;
                --primary: #3b82f6;
                --text: #ffffff;
                --text-dim: #94a3b8;
                --border: #2d2d33;
            }
            * { box-sizing: border-box; }
            body { 
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
                background: var(--bg); 
                color: var(--text); 
                margin: 0; 
                padding: 15px; 
                display: flex;
                flex-direction: column;
                height: 100vh;
                height: 100dvh;
                box-sizing: border-box;
                overflow: hidden;
            }
            #status { font-size: 9px; color: #555; margin-bottom: 2px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; opacity: 0.7; }
            .connected { color: #10b981 !important; }
            .disconnected { color: #ef4444 !important; }

            .header { margin-bottom: 8px; }
            h2 { color: var(--primary); margin: 0; font-size: 16px; letter-spacing: 0.5px; font-weight: 800; }

            #history-container {
                flex: 1;
                overflow-y: auto;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                margin-bottom: 10px;
                padding: 6px;
                display: flex;
                flex-direction: column;
                gap: 5px;
            }

            .history-item {
                background: #1e1e24;
                border: 1px solid #333;
                border-radius: 6px;
                padding: 6px 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                animation: fadeIn 0.2s ease-out;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .history-text {
                font-size: 12px;
                color: #e2e8f0;
                text-align: left;
                word-break: break-word;
                flex: 1;
                margin-right: 8px;
            }

            .copy-btn {
                background: #2d2d33;
                border: none;
                border-radius: 5px;
                padding: 5px;
                color: var(--primary);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
                min-width: 30px;
                height: 30px;
            }

            .copy-btn:active {
                background: #3b82f633;
                transform: scale(0.95);
            }

            .input-area {
                background: var(--card);
                padding: 12px;
                border-radius: 16px;
                border: 1px solid var(--border);
                box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            }

            textarea { 
                width: 100%; 
                height: 60px; 
                background: rgba(255,255,255,0.03); 
                color: white; 
                border: 1px solid rgba(255,255,255,0.05); 
                border-radius: 8px;
                padding: 8px; 
                box-sizing: border-box; 
                font-size: 15px; 
                outline: none; 
                resize: none;
                font-family: inherit;
                margin-bottom: 10px;
                transition: border-color 0.2s;
            }

            textarea:focus {
                border-color: var(--primary);
            }

            .button-dock {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
                justify-content: center;
            }

            .dock-btn {
                width: calc(25% - 6px);
                flex: none;
                height: 44px;
                background: #2d2d33;
                border: 1px solid #3d3d45;
                border-radius: 10px;
                color: #e2e8f0;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.1s;
                touch-action: manipulation;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }

            .dock-btn:active {
                transform: scale(0.92);
                background: #444;
            }

            .send-btn { 
                width: 100%;
                height: 50px;
                background: var(--primary); 
                color: white; 
                border: none; 
                border-radius: 12px; 
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                font-weight: 700;
                font-size: 14px;
                letter-spacing: 1px;
                box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.3);
                touch-action: manipulation;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
                margin-top: 12px;
                text-transform: uppercase;
            }

            .send-btn:active {
                transform: scale(0.95);
                filter: brightness(1.1);
            }

            #streaming-box {
                font-size: 10px;
                color: #6366f1;
                background: #6366f111;
                padding: 4px 8px;
                border-radius: 6px;
                margin-bottom: 8px;
                text-align: left;
                font-family: 'Cascadia Code', 'Consolas', monospace;
                white-space: pre-wrap;
                max-height: 30px;
                overflow: hidden;
                border: 1px solid #6366f122;
            }

            /* Modal Styles */
            .modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.85);
                backdrop-filter: blur(4px);
                z-index: 1000;
                justify-content: center;
                align-items: center;
                padding: 0;
            }

            .modal {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 24px;
                width: 95%;
                max-width: 320px;
                text-align: center;
                box-shadow: 0 20px 50px rgba(0,0,0,0.6);
                animation: modalScale 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
                display: flex;
                flex-direction: column;
                max-height: 80vh;
            }

            .modal.full-width {
                width: 100%;
                max-width: none;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }

            #modal-content {
                overflow-y: auto;
                padding-right: 5px;
            }

            #modal-content::-webkit-scrollbar { width: 4px; }
            #modal-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

            .scroll-area::-webkit-scrollbar { display: none; }
            .scroll-area {
                scrollbar-width: none;
                -ms-overflow-style: none;
                overflow-y: scroll !important;
            }
            .custom-scrollbar-container {
                position: relative;
                margin-bottom: 20px;
            }
            .custom-scrollbar-track {
                position: absolute;
                top: 0;
                right: 0;
                width: 4px;
                height: 100%;
                background: rgba(255,255,255,0.05);
                border-radius: 10px;
                pointer-events: none;
            }
            .custom-scrollbar-thumb {
                position: absolute;
                top: 0;
                right: 0;
                width: 4px;
                background: var(--primary);
                border-radius: 10px;
                pointer-events: none;
            }

            @keyframes modalScale {
                from { transform: scale(0.85); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            .modal h3 { margin: 0 0 15px 0; font-size: 18px; color: var(--primary); flex-shrink: 0; }

            .modal-btn {
                width: 100%;
                min-height: 50px;
                margin-bottom: 12px;
                border: 1px solid var(--border);
                border-radius: 12px;
                background: #2d2d33;
                color: white;
                font-weight: 600;
                font-size: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                cursor: pointer;
                flex-shrink: 0;
            }

            .modal-btn.window-item {
                font-size: 12px;
                justify-content: flex-start;
                padding: 0 15px;
                text-align: left;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                display: block;
                line-height: 50px;
            }

            .modal-btn:active { transform: scale(0.96); background: #3d3d45; }
            .modal-btn.cancel { border: none; background: transparent; color: var(--text-dim); margin-top: 5px; flex-shrink: 0; }

            .landscape-only { display: none !important; }
            .portrait-only { display: flex !important; }

            /* Modo Landscape / Telas pequenas em altura */
            @media (orientation: landscape) or (max-height: 450px) {
                .landscape-only { display: flex !important; }
                .portrait-only { display: none !important; }

                #modal-content.touchpad-active {
                    flex-direction: row !important;
                    gap: 12px !important;
                    align-items: stretch !important;
                }
                .touchpad-side-controls {
                    width: 140px;
                    display: flex;
                    flex-direction: column;
                    justify-content: space-between;
                    flex-shrink: 0;
                }
                .touchpad-side-controls .mouse-btns {
                    flex-direction: column !important;
                    flex: 1;
                    justify-content: center;
                    gap: 8px !important;
                }
                .touchpad-side-controls .mouse-btns .modal-btn {
                    flex: none !important;
                    height: 45px !important;
                    min-height: 45px !important;
                    padding: 0 !important;
                }
                #touch-area {
                    margin-bottom: 0 !important;
                }
                .modal.full-width {
                    height: 98vh !important;
                }
            }

            /* Overlay de Sensibilidade */
            #sens-settings-overlay {
                display: none;
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(8, 8, 10, 0.98);
                z-index: 100;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 30px;
                border-radius: 20px;
                animation: fadeIn 0.2s ease-out;
            }

            /* Fullscreen Fix */
            :fullscreen .modal.full-width {
                width: 100vw !important;
                height: 100vh !important;
                max-height: 100vh !important;
                border: none !important;
                border-radius: 0 !important;
            }
            :fullscreen .modal-overlay { padding: 0 !important; }
        </style>
    </head>
    <body>
        <div id="status">Iniciando...</div>

        <!-- Restart Modal -->
        <div id="restart-modal" class="modal-overlay" onclick="closeModal(event)">
            <div class="modal" onclick="event.stopPropagation()">
                <h3 id="modal-title">OTHER ACTIONS</h3>
                <div id="modal-content">
                    <button class="modal-btn" onclick="ws.send(JSON.stringify({ type: 'MESSAGE', msg: 'faça o commit e Sync' })); closeModal();" style="color: #10b981;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path><line x1="12" y1="2" x2="12" y2="8"></line><line x1="12" y1="16" x2="12" y2="22"></line></svg>
                        Commit e Sync
                    </button>
                    <button class="modal-btn" onclick="execRestart('RESTART_EXT')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                        Restart Extension
                    </button>
                    <button class="modal-btn" onclick="execRestart('REFRESH_F5')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        Refresh (F5)
                    </button>
                    <button class="modal-btn" onclick="execRestart('RESTART_PROJECT')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        Restart Project (npm)
                    </button>
                    <button class="modal-btn" onclick="getWindows()" style="color: #60a5fa;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Alt Tab
                    </button>
                    <button class="modal-btn" onclick="openFreeWriting()" style="color: #c084fc;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M6 8h.01"></path><path d="M10 8h.01"></path><path d="M14 8h.01"></path><path d="M18 8h.01"></path><path d="M6 12h.01"></path><path d="M10 12h.01"></path><path d="M14 12h.01"></path><path d="M18 12h.01"></path><path d="M6 16h.01"></path><path d="M10 16h.01"></path><path d="M14 16h.01"></path><path d="M18 16h.01"></path></svg>
                        Escrever Livremente
                    </button>
                </div>
                <button id="main-cancel-btn" class="modal-btn cancel" onclick="closeModal()" style="margin-bottom: 0;">CANCELAR</button>
            </div>
        </div>
        <div class="header">
            <h2>ANTIGRAVITY BRIDGE</h2>
        </div>

        <div id="streaming-box">Aguardando código...</div>
        
        <div id="history-container">
            <!-- Itens de histórico entram aqui -->
        </div>

        <div class="input-area">
            <textarea id="msg" 
                placeholder="Dite algo..." 
                onkeydown="checkEnter(event)" 
                onfocus="scrollToBottom()"
                autocomplete="on" 
                autocorrect="on" 
                autocapitalize="sentences" 
                spellcheck="true"
                inputmode="text"></textarea>
            
            <div class="button-dock">
                <button class="dock-btn" onclick="openModal()" title="Outras Ações" style="color: #fbbf24;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                </button>
                <button class="dock-btn" onclick="openTouchpad()" title="Touchpad Mode" style="color: #a78bfa;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="7" ry="7"></rect><path d="M12 6v4"></path></svg>
                </button>

                <button class="dock-btn" onpointerdown="event.preventDefault(); sendAction('COPY')" title="Copiar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
                <button class="dock-btn" onpointerdown="event.preventDefault(); sendAction('PASTE')" title="Colar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                </button>
                <button class="dock-btn" onpointerdown="event.preventDefault(); sendAction('ENTER')" title="Pular Linha" style="color: #10b981;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"></polyline><path d="M20 4v7a4 4 0 0 1-4 4H4"></path></svg>
                </button>
                <button class="dock-btn" onpointerdown="event.preventDefault(); sendAction('BACKSPACE')" title="Backspace">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                </button>
                <button class="dock-btn" onpointerdown="event.preventDefault(); sendAction('SAVE')" title="Salvar (Ctrl+S)" style="color: #60a5fa;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                </button>
            </div>
            <button class="send-btn" onpointerdown="event.preventDefault(); send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                ENVIAR PROMPT
            </button>
        </div>

        <script>
            let ws;
            let isReconnected = false;
            let sensitivity = localStorage.getItem('sensitivity') ? parseFloat(localStorage.getItem('sensitivity')) : 1.5;
            let activeModifiers = { CTRL: false, ALT: false, SHIFT: false, WIN: false };

            function toggleModifier(mod) {
                activeModifiers[mod] = !activeModifiers[mod];
                window.navigator.vibrate && window.navigator.vibrate(10);
                // Se estiver no modal de funções, re-renderiza para mostrar o estado ativo
                const title = document.getElementById('modal-title');
                if (title && title.innerText === 'TECLADO DE FUNÇÃO') {
                    openFunctionKeys();
                }
            }

            function connect() {
                const status = document.getElementById('status');
                ws = new WebSocket('ws://' + window.location.host);
                
                ws.onopen = () => {
                    status.innerText = '● CONECTADO';
                    status.className = 'connected';
                    ws.send(JSON.stringify({ type: 'HELLO', reconnected: isReconnected }));
                    isReconnected = false;
                };

                ws.onmessage = (e) => {
                    const d = JSON.parse(e.data);
                    
                    if(d.type === 'UPDATE') {
                        const s = document.getElementById('streaming-box');
                        s.innerText = d.payload;
                    }

                    if(d.type === 'HISTORY') {
                        renderHistory(d.payload);
                    }

                    if(d.type === 'COMMAND' && d.action === 'REFRESH') {
                        window.location.reload();
                    }

                    if(d.type === 'WINDOWS_LIST') {
                        renderWindowList(d.payload);
                    }
                };

                ws.onclose = () => {
                    status.innerText = '○ DESCONECTADO - RECONECTANDO...';
                    status.className = 'disconnected';
                    isReconnected = true; 
                    setTimeout(connect, 2000);
                };

                ws.onerror = () => { ws.close(); };
            }

            function renderHistory(history) {
                const container = document.getElementById('history-container');
                container.innerHTML = '';
                
                if (history.length === 0) {
                    container.innerHTML = '<div style="color: #444; margin-top: 20px;">Nenhum envio recente</div>';
                    return;
                }

                history.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="history-text">${escapeHtml(item.text)}</div>
                        <button class="copy-btn" onclick="copyToInput('${item.id}', event)" title="Copiar para o input">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    `;
                    container.appendChild(div);
                });

                // Auto-scroll para o final
                container.scrollTop = container.scrollHeight;

                // Armazena o histórico globalmente para busca rápida
                window.currentHistory = history;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function copyToInput(id, event) {
                event && event.preventDefault();
                const item = window.currentHistory.find(h => h.id == id);
                if (item) {
                    const textarea = document.getElementById('msg');
                    textarea.value = item.text;
                    textarea.focus();
                    
                    // Tenta copiar para o clipboard do smartphone
                    let copied = false;
                    try {
                        // Tenta o método moderno primeiro (pode falhar em HTTP)
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(item.text);
                            copied = true;
                        }
                    } catch (err) {}

                    // Fallback para HTTP / Navegadores antigos
                    if (!copied) {
                        try {
                            const tempInput = document.createElement('textarea');
                            tempInput.value = item.text;
                            tempInput.style.position = 'fixed';
                            tempInput.style.left = '-9999px';
                            tempInput.style.top = '0';
                            document.body.appendChild(tempInput);
                            tempInput.select();
                            tempInput.setSelectionRange(0, 99999);
                            document.execCommand('copy');
                            document.body.removeChild(tempInput);
                            copied = true;
                        } catch (err) {
                            console.error('Falha no fallback de cópia:', err);
                        }
                    }

                    if (copied) {
                        // Feedback visual no botão
                        const btn = event.currentTarget;
                        const oldHtml = btn.innerHTML;
                        btn.innerHTML = '✅';
                        setTimeout(() => btn.innerHTML = oldHtml, 1000);
                    }
                }
            }

            function checkEnter(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    send();
                }
            }

            function send() {
                const m = document.getElementById('msg');
                if(m.value.trim() && ws.readyState === WebSocket.OPEN){ 
                    ws.send(JSON.stringify({ type: 'MESSAGE', msg: m.value })); 
                    m.value = ''; 
                }
            }

            function sendAction(action) {
                if(ws.readyState === WebSocket.OPEN) {
                    const mods = Object.keys(activeModifiers).filter(k => activeModifiers[k]);
                    ws.send(JSON.stringify({ type: 'KEY_SIM', action: action, modifiers: mods }));
                    
                    // Limpa modificadores após o uso (comportamento sticky)
                    if (mods.length > 0) {
                        activeModifiers = { CTRL: false, ALT: false, SHIFT: false, WIN: false };
                        const title = document.getElementById('modal-title');
                        if (title && (title.innerText === 'TECLADO DE FUNÇÃO' || title.innerText === 'ESCREVER LIVREMENTE')) {
                            // Pequeno delay para o usuário ver o estado ativo antes de limpar (opcional)
                            setTimeout(openFunctionKeys, 100);
                        }
                    }
                    
                    window.navigator.vibrate && window.navigator.vibrate(10);
                }
            }

            function openModal() {
                const modalDiv = document.querySelector('.modal');
                modalDiv.classList.remove('full-width');
                modalDiv.style.height = '';
                modalDiv.style.maxHeight = '80vh';
                modalDiv.style.padding = '24px';
                modalDiv.style.marginTop = '';

            function closeModal(e) {
                if (e && e.target !== e.currentTarget) return;
                const restartModal = document.getElementById('restart-modal');
                if (restartModal) restartModal.style.display = 'none';
                
                const mainCancel = document.getElementById('main-cancel-btn');
                if (mainCancel) mainCancel.style.display = 'block';

                const modal = document.querySelector('.modal');
                if (modal) {
                    modal.classList.remove('full-width');
                    modal.style.height = '';
                    modal.style.maxHeight = '80vh';
                    modal.style.padding = '24px';
                }
                
                const title = document.getElementById('modal-title');
                if (title) title.style.display = 'block';

                const content = document.getElementById('modal-content');
                if (content) {
                    content.classList.remove('touchpad-active');
                    content.style.display = 'block';
                    content.style.height = 'auto';
                }
                
                // Reset de modificadores ao fechar
                activeModifiers = { CTRL: false, ALT: false, SHIFT: false, WIN: false };
            }

            function openAltTab() {
                openModal();
                getWindows();
            }

            function getWindows() {
                if(ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'KEY_SIM', action: 'GET_WINDOWS' }));
                    document.getElementById('modal-title').innerText = 'BUSCANDO JANELAS...';
                }
            }

            function renderWindowList(windows) {
                const title = document.getElementById('modal-title');
                const content = document.getElementById('modal-content');
                title.innerText = 'ALT TAB';
                content.innerHTML = '';
                
                if (windows.length === 0) {
                    content.innerHTML = '<div style="color: #666; padding: 20px;">Nenhuma janela encontrada</div>';
                } else {
                    windows.forEach(w => {
                        const btn = document.createElement('button');
                        btn.className = 'modal-btn window-item';
                        btn.innerText = w.title;
                        btn.onclick = () => switchWindow(w.id, w.title);
                        content.appendChild(btn);
                    });
                }
                
                // Botão de Voltar
                const backBtn = document.createElement('button');
                backBtn.className = 'modal-btn';
                backBtn.style.marginTop = '10px';
                backBtn.style.background = 'transparent';
                backBtn.style.borderColor = '#444';
                backBtn.innerHTML = '← Voltar';
                backBtn.onclick = openModal;
                content.appendChild(backBtn);
            }

            function switchWindow(id, title) {
                if(ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'KEY_SIM', action: 'SWITCH_WINDOW', windowId: id, title: title }));
                    // Ao invés de fechar, volta para o menu principal de ações
                    openModal();
                }
            }

            function sendFreeText() {
                const m = document.getElementById('free-msg');
                if(m.value.trim() && ws.readyState === WebSocket.OPEN){ 
                    ws.send(JSON.stringify({ type: 'FREE_TEXT', msg: m.value })); 
                    m.value = ''; 
                    window.navigator.vibrate && window.navigator.vibrate(20);
                }
            }

            function checkFreeEnter(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendFreeText();
                }
            }

            function insertNewLine() {
                const m = document.getElementById('free-msg');
                const start = m.selectionStart;
                const end = m.selectionEnd;
                const top = m.scrollTop;
                m.value = m.value.substring(0, start) + "\n" + m.value.substring(end);
                m.selectionStart = m.selectionEnd = start + 1;
                m.scrollTop = top;
                m.focus();
            }

            function execRestart(action) {
                sendAction(action);
                closeModal();
            }

                });

                            <!-- Botões de Clique (Sempre visíveis, mudam direção via CSS) -->
                            <div class="mouse-btns" style="display: flex; gap: 10px; margin-bottom: 12px; flex-shrink: 0;">
                                <button class="modal-btn" onpointerdown="event.preventDefault(); sendMouseClick('LEFT')" style="flex: 1; margin: 0; min-height: 60px; font-size: 14px; background: #2563eb;">ESQ</button>
                                <button class="modal-btn" onpointerdown="event.preventDefault(); sendMouseClick('MIDDLE')" style="flex: 1; margin: 0; min-height: 60px; font-size: 14px;">MEIO</button>
                                <button class="modal-btn" onpointerdown="event.preventDefault(); sendMouseClick('RIGHT')" style="flex: 1; margin: 0; min-height: 60px; font-size: 14px; background: #4b5563;">DIR</button>
                            </div>

                            <!-- Controles para MODO PAISAGEM (Botão Sensibilidade + Fullscreen) -->
                            <div class="landscape-only" style="gap: 8px; margin-bottom: 12px; flex-shrink: 0;">
                                <button class="modal-btn" onclick="toggleSensOverlay()" style="flex: 1; margin: 0; min-height: 44px; font-size: 11px; background: #3d3d45; color: #a78bfa; font-weight: bold;">SENS</button>
                                <button class="modal-btn" onclick="toggleFullscreen()" style="width: 44px; margin: 0; min-height: 44px; background: #3d3d45; padding: 0;">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
                                </button>
                            </div>

                            <!-- Controles para MODO RETRATO (Slider + Fullscreen na mesma linha) -->
                            <div id="sens-container" class="portrait-only" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: #2d2d33; padding: 10px; border-radius: 12px; flex-shrink: 0;">
                                <span style="font-size: 11px; color: #94a3b8; font-weight: bold; min-width: 40px;">SENS:</span>
                                <input type="range" id="sens-slider" min="0.5" max="4.0" step="0.1" value="${sensitivity}" 
                                    style="flex: 1; accent-color: #3b82f6;" 
                                    oninput="sensitivity = parseFloat(this.value); localStorage.setItem('sensitivity', this.value);">
                                <button onclick="toggleFullscreen()" style="background: #3d3d45; border: none; color: #e2e8f0; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
                                </button>
                            </div>
                            <button class="modal-btn cancel" onclick="closeModal()" style="margin: 0; flex-shrink: 0;">FECHAR</button>
                        </div>

                        <!-- Modal Overlay para ajuste de sensibilidade no modo paisagem -->
                        <div id="sens-settings-overlay">
                            <h4 style="margin: 0 0 20px 0; color: #a78bfa; letter-spacing: 1px;">AJUSTAR SENSIBILIDADE</h4>
                            <div style="width: 100%; display: flex; align-items: center; gap: 15px; background: #1e1e24; padding: 25px; border-radius: 20px; border: 1px solid #333;">
                                <span style="font-size: 12px; color: #94a3b8; font-weight: bold;">0.5x</span>
                                <input type="range" min="0.5" max="4.0" step="0.1" value="${sensitivity}" 
                                    style="flex: 1; height: 10px; accent-color: #3b82f6;" 
                                    oninput="sensitivity = parseFloat(this.value); localStorage.setItem('sensitivity', this.value); document.getElementById('sens-val-badge').innerText = this.value + 'x'">
                                <span style="font-size: 12px; color: #94a3b8; font-weight: bold;">4.0x</span>
                            </div>
                            <div id="sens-val-badge" style="margin-top: 20px; font-size: 24px; font-weight: 900; color: #3b82f6;">${sensitivity}x</div>
                            <button class="modal-btn" onclick="toggleSensOverlay()" style="margin-top: 35px; width: 160px; background: #2563eb; font-weight: 800;">CONCLUÍDO</button>
                        </div>
                    `;
                    setupTouchpad();
                }
            }

            function updateCustomScrollbar(el) {
                const thumb = document.getElementById('custom-thumb');
                if (!thumb) return;
                
                const scrollHeight = el.scrollHeight;
                const clientHeight = el.clientHeight;
                
                if (scrollHeight <= clientHeight) {
                    thumb.style.display = 'none';
                    return;
                } else {
                    thumb.style.display = 'block';
                }
                
                const thumbHeight = Math.max((clientHeight / scrollHeight) * clientHeight, 20);
                thumb.style.height = `${thumbHeight}px`;
                
                const scrollRatio = el.scrollTop / (scrollHeight - clientHeight);
                const maxThumbTop = clientHeight - thumbHeight;
                const thumbTop = scrollRatio * maxThumbTop;
                
                thumb.style.top = `${thumbTop}px`;
            }

            function setupTouchpad() {
                const pad = document.getElementById('touch-area');
                if (!pad) return;
                let lastX = 0, lastY = 0;
                let lastScrollY = 0;
                
                let touchStartTime = 0;
                let isMoved = false;
                let longPressTimer = null;

                pad.oncontextmenu = (e) => { e.preventDefault(); return false; };

                pad.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    isMoved = false;
                    touchStartTime = Date.now();

                    if (e.touches.length === 1) {
                        lastX = e.touches[0].clientX;
                        lastY = e.touches[0].clientY;

                        longPressTimer = setTimeout(() => {
                            if (!isMoved) {
                                sendMouseClick('RIGHT');
                                window.navigator.vibrate && window.navigator.vibrate([30, 30]);
                                longPressTimer = null;
                                touchStartTime = 0; // Impede clique esquerdo no end
                            }
                        }, 600);
                    } else if (e.touches.length === 2) {
                        lastScrollY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        if(longPressTimer) clearTimeout(longPressTimer);
                    }
                }, { passive: false });

                pad.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (e.touches.length === 1) {
                        const curX = e.touches[0].clientX;
                        const curY = e.touches[0].clientY;
                        const dx = curX - lastX;
                        const dy = curY - lastY;
                        
                        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                            isMoved = true;
                            if(longPressTimer) {
                                clearTimeout(longPressTimer);
                                longPressTimer = null;
                            }
                        }

                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'MOUSE_SIM', action: 'MOVE', dx: dx * sensitivity, dy: dy * sensitivity }));
                        }
                        
                        lastX = curX;
                        lastY = curY;
                    } else if (e.touches.length === 2) {
                        isMoved = true;
                        const curScrollY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const dy = curScrollY - lastScrollY;
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'MOUSE_SIM', action: 'SCROLL', dy: dy * -(sensitivity + 0.5) }));
                        }
                        lastScrollY = curScrollY;
                    }
                }, { passive: false });

                pad.addEventListener('touchend', (e) => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }

                    if (!isMoved && touchStartTime > 0) {
                        const duration = Date.now() - touchStartTime;
                        if (duration < 300) {
                            sendMouseClick('LEFT');
                        }
                    }
                });
            }

            function sendMouseClick(btn) {
                if(ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'MOUSE_SIM', action: 'CLICK', button: btn }));
                    window.navigator.vibrate && window.navigator.vibrate(15);
                }
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Erro ao entrar em fullscreen: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }

            function toggleSensOverlay() {
                const overlay = document.getElementById('sens-settings-overlay');
                if (!overlay) return;
                const isVisible = overlay.style.display === 'flex';
                overlay.style.display = isVisible ? 'none' : 'flex';
            }

            connect();
        </script>
    </body>
    </html>
